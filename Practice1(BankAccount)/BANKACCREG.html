<!DOCTYPE html>
<html lang="en-US"> 
    <head>
        <title>Registration form</title>
    </head>
    <body>
        <div class="container">

        <form>
            <fieldset>
                <legend>Signup</legend>
                <h1 style="text-align:center;"> <font color="red">Bank Account Registration</font></h1>
                <table>
                    <tr>
                        <td><label for="accountholder">Account Holder Name:</label></td>
                        <td><input type="text" id=name name=name></td>
                    </tr>

                    <tr>
                        <td><label for="phone">Account Holder Phone Number:</label></td>
                        <td><input type="text" id=phone name=phone></td>
                    </tr>

                    <tr>
                        <td><label for="email">Account Holder Email:</label></td>
                        <td><input type="email" id=email name=email></td>
                    </tr>

                    <tr>
                        <td><label for="address">Account Holder Address:</label></td>
                        <td><textarea id=address cols="20" rowa="20"></textarea></td>
                    </tr>

                    <tr>
                        <td><label for="gender">Gender:</label></td>
                        <td>
                            <input type="radio" id=gender name=gender value="Male">
                            <label for="gender">Male</label>
                            <input type="radio" id=gender name=gender value="Female">
                            <label for="gender">Female</label>
                        </td>
                    </tr>
                
                </table>
            </fieldset>
        </form>

        <form>
            <fieldset>
                <legend>Personal Account Info</legend>
                <table>
                    <tr>
                        <td><label for="user">User Name:</label></td>
                        <td><input type="text" id=name name=name></td>
                    </tr>

                    <tr>
                        <td><label for="password">Password:</label></td>
                        <td><input type="password" id=name name=name></td>
                    </tr>

                     <tr>
                        <td><label for="password">Confirm Password:</label></td>
                        <td><input type="password" id=name name=name></td>
                    </tr>

                </table>
            </fieldset>
            
        </form>

        </div>
    </body>
</html>
