<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title>Reg</title>
        <link rel="stylesheet" href=".....">
    </head>
    <body> 
        <div class="header">
            <h1>AIUB PORTAL</h1>
        </div>
        <div class="topnav">
            <a href="loginn.html">Login</a>
            <a href="Register.html">Register</a>
        </div>
        <div class="container">
            <form>
                <fieldset>
                    <legend>UserInfo</legend>
                    <table>
                        <tr>
                            <td><label for="name">Name</label></td>
                            <td><input type="text" id=name name=name></td>
                        </tr>
                        <tr>
                            <td><label for="phone">Phone Number</label></td>
                            <td><input type="text" id=phone name=phone </td>
                        </tr>
                        <tr>
                            <td><label for="email">Email</label></td>
                            <td><input type="email" id=email name=email </td>
                        </tr>
                        <tr>
                            <td><label for="gender">Gender</label></td>
                        <td>
                            <input type="radio" id=male name=gender value="Male">
                            <label for="Male">Male</label>
                            <input type="radio" id=fe name=gender value="Female">
                            <label for="Female">Female</label>
                        </td> 
                        </tr> 
                        <tr>
                            <td><label for="DOB">Birth of Date</label></td>
                            <td><input type="date" id=DOB name=DOB ></td>
                        </tr>    
                        <tr>
                            <td><label for="address">Address</label></td>
                            <td><textarea id = address cols="20" rows="10" style="resize:None">
                            </textarea></td>
                        </tr>   
                        <tr>
                            <td><label for="file">Upload file</label></td>
                            <td><input type="file" id=file name=file ></td>
                        </tr> 
                        <tr>
                            <td><label for="password">Password</label></td>
                            <td><input type="password" id=password name=password ></td>
                        </tr> 
                        <tr>
                            <td><label for="country">Country</label></td>
                            <td>
                                <select id="country">
                                <option value="Default">---select country----</option>
                                <option value="BD">BANGLADESH</option>
                                <option value="UK">United Kingdom</option>
                                </td>
                        </tr> 
                        </tr>
                        <tr>
                            <td><label for="interest">USerInterest</label></td>
                        <td>
                            <input type="checkbox" id=sports name=interest value="Sports">
                            <label for="sports">Sports</label>
                            <br>
                            <input type="checkbox" id=interest name=drwaing value="Drwaing">
                            <label for="drwaing">Drwaing</label>
                        </td> 
                        </tr> 
                        <tr>
                        <td>
                            <input type="radio" id="conditions" name="conditions" value="Conditions">
                            <label for="conditions"><font color="red">I Agree Terms and Conditions *</font></label>
                        </td>
                        </tr>
                       
                    <tr>
                         <td colspan="2">
                         <a href="login.html"><input type="button" value="Signup"</a>
                         </td>
                         
                    </tr>
                            
                    </table>
                   
                </fieldset>
            </form>
        </div>
    </body>
</html>
