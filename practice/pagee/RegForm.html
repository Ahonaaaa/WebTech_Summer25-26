<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title>Signup</title>
        <link rel="stylesheet" href="D:\WebTechnology\WebTechLab\MidTerm\WebTech_Summer25-26\practice\designn\stylee.css">
    </head>
    <body>
        <div class="header">
            <h2>WebTech Portal</h2>
        </div>

        <div class="topnav">
            <a href="UserRegistration.html">Register</a>
            <a href="loginn.html">Login</a>
        </div>

        <div class="container">
            <h1><font color="red">User Registration Form</font></h1>
            <form>
                <fieldset>
                    <legend>User Information</legend>
                    <table>
                        <tr>
                            <td><label for="name">Name:</label></td>
                            <td><input type="text" id="name" name="name"></td>
                        </tr>
                        <tr>
                            <td><label for="phone">Phone Number:</label></td>
                            <td><input type="text" id="phone" name="phone"></td>
                        </tr>
                        <tr>
                            <td><label for="email">Email:</label></td>
                            <td><input type="email" id="email" name="email"></td>
                        </tr>
                        <tr>
                            <td><label for="gender">Gender:</label></td>
                            <td>
                                <input type="radio" id="male" name="gender" value="Male">
                                <label for="male">Male</label>
                                <input type="radio" id="female" name="gender" value="Female">
                                <label for="female">Female</label>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="dob">Date of Birth:</label></td>
                            <td><input type="date" id="dob" name="dob"></td>
                        </tr>
                        <tr>
                            <td><label for="address">Address:</label></td>
                            <td><textarea id="address" cols="20" rows="3" style="resize:none;"></textarea></td>
                        </tr>
                        <tr>
                            <td><label for="pass">Password:</label></td>
                            <td><input type="password" id="pass" name="pass"></td>
                        </tr>
                        <tr>
                            <td><label for="country">Country:</label></td>
                            <td>
                                <select id="country" name="country">
                                    <option value="">--- Select Country ---</option>
                                    <option value="BD">Bangladesh</option>
                                    <option value="UK">United Kingdom</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td><label>Interests:</label></td>
                            <td>
                                <input type="checkbox" id="sports" name="interests" value="Sports">
                                <label for="sports">Sports</label><br>
                                <input type="checkbox" id="reading" name="interests" value="Reading">
                                <label for="reading">Reading</label>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="file">File Upload:</label></td>
                            <td><input type="file" id="file" name="file"></td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <input type="checkbox" id="terms" name="terms">
                                <label for="terms"><font color="red">I Agree Terms and Conditions *</font></label>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <a href="login.html"><input type="button" value="SignUp" class="submit-btn"></a>
                            </td>
                        </tr>
                    </table>
                </fieldset>
            </form>
        </div>
    </body>
</html>
